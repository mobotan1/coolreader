name: Generate APK

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Forces every 'run:' step to operate inside the android directory
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          # Tells GitHub Actions to recursively fetch all native submodules automatically
          submodules: 'recursive'
          # Disables shallow cloning so older submodule references resolve cleanly
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.BASE64_KEYSTORE }}" | base64 --decode > keystore.jks

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "storeFile=${{ secrets.STORE_FILE }}" >> local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build APK for Staging
        # Runs the specific stripped release variant found in your project logs
        run: ./gradlew :app:assembleRelease_stripped

      - name: Debug - Find APK files
        run: find app/build/outputs/apk -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gameskii-staging-apk
          path: android/app/build/outputs/apk/**/*.apk
