name: Generate APK

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This forces every 'run:' command to execute inside your subfolder
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0  # <-- Pulls all tags, branches, and historical commits for submodules

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.BASE64_KEYSTORE }}" | base64 --decode > keystore.jks

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "storeFile=${{ secrets.STORE_FILE }}" >> local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew   

      - name: Build APK for Staging
        # Using the actual variant found in your logs
        run: ./gradlew :app:assembleRelease

      - name: Debug - Find APK files
        # Updated search path to look inside your subfolder
        run: find app/build/outputs/apk -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gameskii-staging-apk
          # Path matched to standard Gradle outputs under your working directory
          path: app/build/outputs/apk/**/*.apk
