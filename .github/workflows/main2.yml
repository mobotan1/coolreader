name: Generate APK

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This forces every 'run:' command to execute inside your subfolder
    defaults:
      run:
        working-directory: ./android
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # <-- Upgraded from v3

      - name: Set up JDK (fixed)
        uses: actions/setup-java@v4  # <-- Upgraded from v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.BASE64_KEYSTORE }}" | base64 --decode > keystore.jks

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "storeFile=${{ secrets.STORE_FILE }}" >> local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: List Available Gradle Tasks
        # Temporarily run this to see your valid task names in the logs
        run: ./gradlew -p android tasks --all
