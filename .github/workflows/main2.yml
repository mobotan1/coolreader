name: Generate APK

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Set the working directory to the 'android' folder for all run steps
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make Thirdparty Setup Script Executable (If Present)
        # We target the root directory where these scripts usually live
        working-directory: ./
        run: |
          # Make any potential setup scripts in the root directory executable
          chmod +x download-*.sh setup.sh init.sh || true

      - name: Run Thirdparty Source Download Script
        working-directory: ./
        run: |
          # Dynamically look for common download script names and execute the first one found
          if [ -f "download-artifacts.sh" ]; then
            ./download-artifacts.sh
          elif [ -f "download-thirdparty.sh" ]; then
            ./download-thirdparty.sh
          elif [ -f "init.sh" ]; then
            ./init.sh
          else
            echo "No explicit download script found in root. Checking subdirectories..."
          fi
