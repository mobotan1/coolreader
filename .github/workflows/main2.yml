name: Generate APK

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This forces every 'run:' command to execute inside your subfolder
    defaults:
      run:
        working-directory: ./android

   steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to ensure full Git history is available for all branches

      - name: Force Sync and Update Submodules
        run: |
          # De-initialize any broken submodule states
          git submodule deinit -f . || true
          
          # Update the submodule URLs to match the repository configuration
          git submodule sync --recursive
          
          # Force a clean clone of all third-party libraries and nested dependencies
          git submodule update --init --recursive --force --prune

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Make Gradle executable
        run: chmod +x ./gradlew   

      - name: Build APK for Staging
        run: ./gradlew :app:assembleRelease_stripped

      - name: Debug - Find APK files
        # Updated search path to look inside your subfolder
        run: find app/build/outputs/apk -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gameskii-staging-apk
          # Path matched to standard Gradle outputs under your working directory
          path: app/build/outputs/apk/**/*.apk
